[build]
  command = "npm run build"
  publish = ".next"
  # Install sharp avec support Linux pour Netlify
  # Configuration de l'environnement de build
  [build.environment]
    NPM_FLAGS = "--include=optional"
    NODE_VERSION = "20"
    NPM_VERSION = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Configuration pour Next.js API routes
# IMPORTANT: Même avec le plan Pro, le timeout maximum est souvent ~50 secondes par fonction.
# La génération rapide utilise des POST par paires (2 images / requête, prompts parallèles) + secours 1 image,
# avec maxDuration côté route (generate-images) pour rester sous la limite hébergeur.

[functions]
  # Configuration pour les fonctions Netlify (si utilisées)
  # Le timeout est configuré dans le code à 45s pour éviter le timeout Netlify (50s)

# Configuration pour le déploiement continu
# Netlify déploiera automatiquement à chaque push sur la branche main
[context.production]
  command = "npm run build"
  publish = ".next"

[context.branch-deploy]
  command = "npm run build"
  publish = ".next"
