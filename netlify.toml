[build]
  command = "npm run build"
  publish = ".next"
  # Install sharp avec support Linux pour Netlify
  # Configuration de l'environnement de build
  [build.environment]
    NPM_FLAGS = "--include=optional"
    NODE_VERSION = "20"
    NPM_VERSION = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Génération d’images (Gemini) : 1 visuel = 1 requête API. Si 504, voir GEMINI_CHUNK_SINGLE_WALL_MS dans NETLIFY_ENV_SETUP.md
# ou augmenter la durée max des fonctions (plan Netlify).

[functions]
  # Configuration pour les fonctions Netlify (si utilisées)
  # Le timeout est configuré dans le code à 45s pour éviter le timeout Netlify (50s)

# Configuration pour le déploiement continu
# Netlify déploiera automatiquement à chaque push sur la branche main
[context.production]
  command = "npm run build"
  publish = ".next"

[context.branch-deploy]
  command = "npm run build"
  publish = ".next"
