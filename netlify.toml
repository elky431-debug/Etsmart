[build]
  command = "apt-get install -y fonts-liberation fonts-dejavu-core 2>/dev/null || true && npm run build"
  publish = ".next"
  # Install sharp avec support Linux pour Netlify
  # Configuration de l'environnement de build
  [build.environment]
    NPM_FLAGS = "--include=optional"
    NODE_VERSION = "20"
    NPM_VERSION = "10"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Génération d’images (Gemini) : plafond gateway ~26 s en synchrone. Voir NETLIFY_ENV_SETUP.md (GEMINI_NETLIFY_FAST_HTTP_MS).
# Dans Netlify : Site settings → Functions → Function timeout → **26** s (max du plan si dispo).

[functions]
  directory = "netlify/functions"

# Configuration pour le déploiement continu
# Netlify déploiera automatiquement à chaque push sur la branche main
[context.production]
  command = "apt-get install -y fonts-liberation fonts-dejavu-core 2>/dev/null || true && npm run build"
  publish = ".next"

[context.branch-deploy]
  command = "npm run build"
  publish = ".next"
